services:
  - type: web
    name: umbra
    runtime: node
    plan: standard
    autoDeploy: false
    healthCheckPath: /api/health
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RATE_LIMIT_MAX
        value: "1200"
      - key: PUBLIC_APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
