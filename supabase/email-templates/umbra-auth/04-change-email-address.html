<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Umbra | Confirma tu nuevo correo</title>
  </head>
  <body style="margin:0;padding:0;background:#0c0f14;color:#f3f6ff;font-family:Inter,Segoe UI,Arial,sans-serif;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">Confirma el cambio del correo asociado a tu acceso de Umbra.</div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0c0f14;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#151922;border:1px solid rgba(255,255,255,0.08);border-radius:24px;overflow:hidden;">
            <tr>
              <td style="padding:28px 32px;background:linear-gradient(135deg,#5d6cf8 0%,#2a335f 55%,#121720 100%);">
                <div style="font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#c8d0ff;font-weight:800;">Umbra</div>
                <div style="margin-top:8px;font-size:30px;line-height:1.15;font-weight:800;color:#ffffff;">Confirma tu nuevo correo</div>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 32px;">
                <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#d8deef;">Recibimos una solicitud para cambiar el correo de tu cuenta de Umbra.</p>
                <div style="margin:0 0 20px;padding:16px 18px;border-radius:16px;background:#10151d;border:1px solid rgba(255,255,255,0.06);">
                  <div style="font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#95a1bb;font-weight:700;">Nuevo correo</div>
                  <div style="margin-top:8px;font-size:16px;font-weight:700;color:#ffffff;">{{ .NewEmail }}</div>
                </div>
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 22px;border-radius:14px;background:#6b78ff;color:#ffffff;text-decoration:none;font-weight:800;font-size:15px;">Confirmar cambio</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
