<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Umbra | Restablece tu clave</title>
  </head>
  <body style="margin:0;padding:0;background:#0c0f14;color:#f3f6ff;font-family:Inter,Segoe UI,Arial,sans-serif;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">Usa este enlace para restablecer tu clave de Umbra.</div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0c0f14;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#151922;border:1px solid rgba(255,255,255,0.08);border-radius:24px;overflow:hidden;">
            <tr>
              <td style="padding:28px 32px;background:linear-gradient(135deg,#5d6cf8 0%,#2a335f 55%,#121720 100%);">
                <div style="font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#c8d0ff;font-weight:800;">Umbra</div>
                <div style="margin-top:8px;font-size:30px;line-height:1.15;font-weight:800;color:#ffffff;">Restablece tu clave</div>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 32px;">
                <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#d8deef;">Se solicito un restablecimiento de clave para tu cuenta. Si fuiste tu, continua desde el boton de abajo.</p>
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 22px;border-radius:14px;background:#6b78ff;color:#ffffff;text-decoration:none;font-weight:800;font-size:15px;">Restablecer clave</a>
                <p style="margin:18px 0 0;font-size:13px;line-height:1.7;color:#96a3bf;">Si no pediste este cambio, ignora este correo y revisa la seguridad de tu cuenta.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
