<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Umbra | Verifica que sigues aqui</title>
  </head>
  <body style="margin:0;padding:0;background:#0c0f14;color:#f3f6ff;font-family:Inter,Segoe UI,Arial,sans-serif;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">Confirma esta accion sensible dentro de Umbra.</div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0c0f14;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#151922;border:1px solid rgba(255,255,255,0.08);border-radius:24px;overflow:hidden;">
            <tr>
              <td style="padding:28px 32px;background:linear-gradient(135deg,#5d6cf8 0%,#2a335f 55%,#121720 100%);">
                <div style="font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#c8d0ff;font-weight:800;">Umbra</div>
                <div style="margin-top:8px;font-size:30px;line-height:1.15;font-weight:800;color:#ffffff;">Verifica que sigues aqui</div>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 32px;">
                <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#d8deef;">Para continuar con esta accion sensible, introduce el codigo temporal mostrado abajo.</p>
                <div style="margin:0 0 20px;padding:18px 18px;border-radius:16px;background:#10151d;border:1px solid rgba(255,255,255,0.06);text-align:center;">
                  <div style="font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#95a1bb;font-weight:700;">Codigo</div>
                  <div style="margin-top:8px;font-size:30px;letter-spacing:.22em;font-weight:800;color:#ffffff;">{{ .Token }}</div>
                </div>
                <p style="margin:0;font-size:13px;line-height:1.7;color:#96a3bf;">Si no estabas intentando confirmar una accion, ignora este correo.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
